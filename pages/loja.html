<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja | Formentini Skins</title>

  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="stylesheet" href="../styles/loja.css">

  <link rel="shortcut icon" href="../assets/favicon.png" type="image/x-icon">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

   <!-- Bootstrap icons  -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="loja-header">
 <a href="../index.html" class="btn-voltar"><i class="bi bi-arrow-bar-left"></i> Voltar</a>


    <div class="nav-logo">Formentini<span>.</span></div>
  
</header>

<main class="loja-grid" id="lojaGrid"></main>

<script>
const SKINS = [
  { name: "M9 BAYONET | LORE", price: 3000, img: "../assets/skins/m9lore.png", tag: "FT", float: 0.20, soldout: true },
  { name: "SPORT GLOVES | VICE", price: 3700, img: "../assets/skins/glovevice.png", tag: "FT", float: 0.28 },
  { name: "DESERT EAGLE | HEAT TREATED", price: 500, img: "../assets/skins/eagleheattreated.png", tag: "FT", float: 0.36, soldout: true },
  { name: "AWP | REDLINE", price: 1000, img: "../assets/skins/awpredline.png", tag: "FT", float: 0.20 },
  { name: "M4A4 | TEMUKAU", price: 250, img: "../assets/skins/m4temukau.png", tag: "FT", float: 0.19 },
  { name: "AK-47 | MIDNIGHT LAMINATE", price: 130, img: "../assets/skins/akmidnight.png", tag: "MW", float: 0.09, soldout: true },
  { name: "GALIL | RAINBOW SPOON", price: 350, img: "../assets/skins/galilrainbow.png", tag: "MW", float: 0.13 },
];

const grid = document.getElementById("lojaGrid");

const formatPrice = (value) =>
  value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

grid.innerHTML = SKINS.map((s) => `
<article class="skin-card ${s.soldout ? "is-sold" : ""}">

  ${s.soldout ? `<div class="sold-overlay">VENDIDO</div>` : ""}

  <div class="img-wrapper">
    <img src="${s.img}" alt="${s.name}" loading="lazy" />
  </div>

  <div class="skin-body">

    <h2 class="skin-name">${s.name}</h2>

    <div class="skin-info">
      <span class="badge">${s.tag}</span>
      <span class="float">Float: ${s.float}</span>
    </div>

    <div class="price">${formatPrice(s.price)}</div>

    ${
      s.soldout
        ? `<button class="btn sold" disabled>Indisponível</button>`
        : `<a class="btn" href="https://wa.me/5521984063033?text=${encodeURIComponent("Quero essa skin: " + s.name)}" target="_blank">
            <i class="bi bi-whatsapp"></i> Comprar
          </a>`
    }

  </div>
</article>
`).join("");
</script>

</body>
</html>
